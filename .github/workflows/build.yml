name: Build & Push to GHCR

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  VALKEY_MAXMEMORY: 256mb
  VALKEY_MAXMEMORY_POLICY: allkeys-lfu

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare Cache Path and Key
        id: cache
        run: |
          set -eux
          VALKEY_CACHE_DIR="${GITHUB_WORKSPACE}/.cache/valkey"
          mkdir -p "${VALKEY_CACHE_DIR}"
          echo "valkey-dir=${GITHUB_WORKSPACE}/.cache/valkey" >> "${GITHUB_OUTPUT}"
          echo "valkey-key-prefix=valkey-sccache-v0-${RUNNER_OS}-${RUNNER_ARCH}-" >> "${GITHUB_OUTPUT}"
      - name: Restore Valkey snapshot
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.cache.outputs.valkey-dir }}
          key: ${{ steps.cache.outputs.valkey-key-prefix }}${{ github.sha }}
          restore-keys: |
            ${{ steps.cache.outputs.valkey-key-prefix }}

      - name: Start Valkey
        id: valkey
        env:
          VALKEY_CACHE_DIR: ${{ steps.cache.outputs.valkey-dir }}
        run: |
          set -eux
          mkdir -p "${VALKEY_CACHE_DIR}"
          id=$(docker run -d \
            --name valkey \
            -v "${VALKEY_CACHE_DIR}:/data" \
            valkey/valkey:8-alpine \
            valkey-server \
              --dir /data \
              --dbfilename dump.rdb \
              --maxmemory "${VALKEY_MAXMEMORY}" \
              --maxmemory-policy "${VALKEY_MAXMEMORY_POLICY}" \
              --save 60 1 \
              --protected-mode no)
          echo "endpoint=$(docker inspect -f 'redis://{{.NetworkSettings.IPAddress}}:6379' "$id")" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read llama.cpp ref
        id: llama_cpp
        run: |
          set -eu
          llama_cpp_ref="$(sed -n 's/^ARG LLAMA_CPP_REF=//p' Dockerfile)"
          if [ -z "${llama_cpp_ref}" ]; then
            echo "LLAMA_CPP_REF is not set in Dockerfile" >&2
            exit 1
          fi
          echo "ref=${llama_cpp_ref}" >> "${GITHUB_OUTPUT}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/tosuke/images/llama-server
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.llama_cpp.outputs.ref }}
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SCCACHE_REDIS_ENDPOINT=${{ steps.valkey.outputs.endpoint }}
          cache-from: type=gha
          cache-to: ${{ github.ref == 'refs/heads/main' && 'type=gha,mode=max' || '' }}

      - name: Flush and stop Valkey
        if: always()
        run: |
          set -eux
          if docker ps -a --format '{{.Names}}' | grep -Fx valkey >/dev/null; then
            docker exec valkey valkey-cli -h 127.0.0.1 info memory || true
            docker exec valkey valkey-cli -h 127.0.0.1 save || true
            docker stop valkey || true
            docker rm valkey || true
          fi
          sudo chown -R "$(id -u):$(id -g)" "${{ steps.cache.outputs.valkey-dir }}" || true
          chmod -R u+rwX "${{ steps.cache.outputs.valkey-dir }}" || true

      - name: Save Valkey snapshot
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.cache.outputs.valkey-dir }}
          key: ${{ steps.cache.outputs.valkey-key-prefix }}${{ github.sha }}
